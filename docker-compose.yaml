services:
  db:
    image: postgres:15-alpine
    container_name: escala-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: escala
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: escala-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: escala-backend
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/escala
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:8080"]'
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: escala-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  adminer:
    image: adminer:4
    container_name: escala-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
